<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDMeter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<style>
  :root {
    --bg-deep: #06070a;
    --bg-primary: #0c0d12;
    --bg-card: #12141b;
    --bg-card-hover: #181a24;
    --border: #1e2130;
    --border-subtle: #15172280;
    --text-primary: #f0f2f8;
    --text-secondary: #a8adc2;
    --text-dim: #747b96;
    --green: #3aff82;
    --green-dim: #3aff8220;
    --green-glow: #3aff8240;
    --yellow: #ffae00;
    --yellow-dim: #ffae0020;
    --yellow-glow: #ffae0040;
    --red: #ff3b4f;
    --red-dim: #ff3b4f20;
    --red-glow: #ff3b4f40;
    --accent: #6c72ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9998;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .header-left { display: flex; align-items: center; gap: 0.75rem; }

  .logo-img {
    width: 36px;
    height: 36px;
    object-fit: contain;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.75rem;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }

  .logo-sub {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .refresh-indicator {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.7rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.2s;
  }

  .refresh-indicator:hover { color: var(--text-secondary); }

  .refresh-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  .refresh-dot.active {
    animation: pulse-green 2s ease-in-out infinite;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 1px;
    margin-bottom: 2rem;
    background: var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .stat-item {
    flex: 1;
    background: var(--bg-card);
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .stat-item:first-child { border-radius: 8px 0 0 8px; }
  .stat-item:last-child { border-radius: 0 8px 8px 0; }

  .stat-label {
    font-size: 0.65rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
  }

  .stat-value.online { color: var(--green); }
  .stat-value.degraded { color: var(--yellow); }
  .stat-value.offline { color: var(--red); }
  .stat-value.total { color: var(--text-primary); }

  /* Filters */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .filter-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    padding: 0.4rem 0.85rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .filter-btn:hover {
    background: var(--bg-card);
    border-color: var(--text-dim);
  }

  .filter-btn.active {
    background: var(--bg-card);
    border-color: var(--accent);
    color: var(--text-primary);
  }

  /* Proxy grid */
  .proxy-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1px;
    background: var(--border-subtle);
    border-radius: 10px;
    overflow: hidden;
  }

  .proxy-card {
    background: var(--bg-card);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: background 0.2s;
    animation: card-in 0.4s ease-out both;
  }

  .proxy-card:hover { background: var(--bg-card-hover); }

  .status-dot-wrap {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  .status-dot-wrap.online { background: var(--green-dim); }
  .status-dot-wrap.degraded { background: var(--yellow-dim); }
  .status-dot-wrap.offline { background: var(--red-dim); }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .status-dot.online {
    background: var(--green);
    box-shadow: 0 0 8px var(--green-glow), 0 0 20px var(--green-glow);
    animation: pulse-green 2.5s ease-in-out infinite;
  }

  .status-dot.degraded {
    background: var(--yellow);
    box-shadow: 0 0 8px var(--yellow-glow), 0 0 20px var(--yellow-glow);
    animation: pulse-yellow 2s ease-in-out infinite;
  }

  .status-dot.offline {
    background: var(--red);
    box-shadow: 0 0 8px var(--red-glow);
  }

  .proxy-info { flex: 1; min-width: 0; }

  .proxy-name {
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text-primary);
    margin-bottom: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .proxy-server {
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  .proxy-health-link {
    font-size: 0.85rem;
    color: var(--text-dim);
    text-decoration: none;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  .proxy-health-link:hover { color: var(--accent); }

  .proxy-card:hover .proxy-health-link { opacity: 1; }

  .proxy-meta {
    flex-shrink: 0;
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.2rem;
  }

  .proxy-latency {
    font-size: 0.8rem;
    font-weight: 500;
  }

  .proxy-latency.online { color: var(--green); }
  .proxy-latency.degraded { color: var(--yellow); }
  .proxy-latency.offline { color: var(--red); }

  .proxy-status-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.8rem;
  }

  .empty-state-icon {
    font-size: 2rem;
    margin-bottom: 1rem;
    opacity: 0.3;
  }

  /* Footer */
  .footer {
    margin-top: 2.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  /* Animations */
  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 6px var(--green-glow), 0 0 16px var(--green-glow); }
    50% { box-shadow: 0 0 10px var(--green-glow), 0 0 28px var(--green-glow); }
  }

  @keyframes pulse-yellow {
    0%, 100% { box-shadow: 0 0 6px var(--yellow-glow), 0 0 16px var(--yellow-glow); }
    50% { box-shadow: 0 0 10px var(--yellow-glow), 0 0 28px var(--yellow-glow); }
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .container { padding: 1.25rem 1rem; }
    .header { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
    .proxy-grid { grid-template-columns: 1fr; }
    .stats-bar { flex-direction: column; }
    .stat-item:first-child { border-radius: 8px 8px 0 0; }
    .stat-item:last-child { border-radius: 0 0 8px 8px; }
  }
</style>
</head>
<body>
<div class="container" x-data="dashboard()" x-init="init()">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <img src="/logo.png?v={{.LogoHash}}" alt="TDMeter" class="logo-img">
      <span class="logo">TDMeter</span>
      <span class="logo-sub">MTProto Proxy Monitor</span>
    </div>
    <div class="refresh-indicator" @click="toggleAutoRefresh()">
      <span class="refresh-dot" :class="{ active: autoRefresh }"></span>
      <span x-text="autoRefresh ? 'Auto-refresh ON' : 'Auto-refresh OFF'"></span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-label">Total</span>
      <span class="stat-value total" x-text="proxies.length"></span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Online</span>
      <span class="stat-value online" x-text="countByStatus('online')"></span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Degraded</span>
      <span class="stat-value degraded" x-text="countByStatus('degraded')"></span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Offline</span>
      <span class="stat-value offline" x-text="countByStatus('offline')"></span>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <button class="filter-btn" :class="{ active: filter === 'all' }" @click="filter = 'all'">All</button>
    <button class="filter-btn" :class="{ active: filter === 'online' }" @click="filter = 'online'">Online</button>
    <button class="filter-btn" :class="{ active: filter === 'degraded' }" @click="filter = 'degraded'">Degraded</button>
    <button class="filter-btn" :class="{ active: filter === 'offline' }" @click="filter = 'offline'">Offline</button>
  </div>

  <!-- Proxy Grid -->
  <div class="proxy-grid" x-show="filtered().length > 0">
    <template x-for="(proxy, i) in filtered()" :key="proxy.name">
      <div class="proxy-card" :style="'animation-delay:' + (i * 0.04) + 's'">
        <div class="status-dot-wrap" :class="proxy.status">
          <div class="status-dot" :class="proxy.status"></div>
        </div>
        <div class="proxy-info">
          <div class="proxy-name" x-text="proxy.name"></div>
          <div class="proxy-server" x-text="proxy.server + ':' + proxy.port"></div>
        </div>
        <a class="proxy-health-link"
           :href="'/health/' + proxy.name"
           :title="location.origin + '/health/' + proxy.name"
           target="_blank"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></a>
        <div class="proxy-meta">
          <div class="proxy-latency" :class="proxy.status">
            <span x-show="proxy.status === 'online'" x-text="proxy.latency_ms.toFixed(0) + ' ms'"></span>
            <span x-show="proxy.status === 'degraded'">degraded</span>
            <span x-show="proxy.status === 'offline'">offline</span>
          </div>
          <div class="proxy-status-label" x-text="proxy.status"></div>
        </div>
      </div>
    </template>
  </div>

  <!-- Empty state -->
  <div class="empty-state" x-show="filtered().length === 0">
    <div class="empty-state-icon">&#x25C8;</div>
    <template x-if="proxies.length === 0">
      <div>Waiting for first check round&hellip;</div>
    </template>
    <template x-if="proxies.length > 0 && filtered().length === 0">
      <div>No proxies match the selected filter.</div>
    </template>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span x-show="lastCheck" x-text="'Last check: ' + lastCheck"></span>
    <span x-show="!lastCheck">No data yet</span>
    <span>TDMeter</span>
  </div>

</div>

<script>
function dashboard() {
  return {
    proxies: [],
    lastCheck: '',
    filter: 'all',
    autoRefresh: true,
    refreshInterval: null,

    async init() {
      await this.fetchStatus();
      this.startAutoRefresh();
    },

    async fetchStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        this.proxies = data.proxies || [];
        if (data.last_check) {
          const d = new Date(data.last_check);
          this.lastCheck = d.toLocaleTimeString();
        }
      } catch (e) {
        console.error('Failed to fetch status:', e);
      }
    },

    countByStatus(status) {
      return this.proxies.filter(p => p.status === status).length;
    },

    filtered() {
      if (this.filter === 'all') return this.proxies;
      return this.proxies.filter(p => p.status === this.filter);
    },

    toggleAutoRefresh() {
      this.autoRefresh = !this.autoRefresh;
      if (this.autoRefresh) {
        this.startAutoRefresh();
      } else {
        this.stopAutoRefresh();
      }
    },

    startAutoRefresh() {
      this.stopAutoRefresh();
      this.refreshInterval = setInterval(() => this.fetchStatus(), {{.RefreshInterval}});
    },

    stopAutoRefresh() {
      if (this.refreshInterval) {
        clearInterval(this.refreshInterval);
        this.refreshInterval = null;
      }
    }
  };
}
</script>
</body>
</html>
